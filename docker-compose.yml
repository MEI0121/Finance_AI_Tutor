services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: finance-ai-tutor-backend
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/chroma_db:/app/backend/chroma_db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: finance-ai-tutor-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped
